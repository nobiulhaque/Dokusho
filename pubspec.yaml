name: dokusho
description: Free and open source manga reader for Android — Dokusho.
publish_to: "none"
version: 0.7.80+107

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^17.2.0
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  html: ^0.15.6
  font_awesome_flutter: ^11.0.0
  flex_color_scheme: ^8.3.1
  extended_image: ^10.0.0
  photo_view: ^0.15.0
  grouped_list: ^6.0.0
  intl: ^0.20.2
  google_fonts: ^8.0.2
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.1
  permission_handler: ^12.0.1
  flutter_inappwebview:
    git:
      url: https://github.com/kodjodevf/flutter_inappwebview.git
      path: flutter_inappwebview
      ref: master
  draggable_menu: ^4.4.1
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  share_plus: ^12.0.2
  xpath_selector_html_parser: ^3.0.1
  archive: ^4.0.9
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  scrollable_positioned_list: ^0.3.8
  bot_toast: ^4.1.3
  numberpicker: ^2.1.2
  encrypt: ^5.0.3
  crypto: ^3.0.7
  cupertino_icons: ^1.0.9
  ffi: ^2.1.5
  http_interceptor: ^2.0.0
  js_packer: ^0.0.6
  flutter_qjs:
    git:
      url: https://github.com/kodjodevf/flutter_qjs.git
      ref: main
  http: ^1.6.0
  re_editor: ^0.9.0
  re_highlight: ^0.0.3
  collection: ^1.18.0
  json_view: ^0.4.2
  super_sliver_list: ^0.4.1
  flutter_rust_bridge: ^2.11.1
  rust_lib_mangayomi:
    path: rust_builder
  pseudom: ^1.0.1
  path: ^1.9.0
  freezed_annotation: ^3.0.0
  flutter_html: ^3.0.0
  convert: ^3.1.2
  connectivity_plus: ^7.0.0
  app_links: ^7.0.0
  protobuf: ^5.0.0
  fixnum: ^1.1.1
  device_info_plus: ^12.2.0
  marquee: ^2.2.3
  d4rt: ^0.2.2
  m_extension_server:
    git:
      url: https://github.com/kodjodevf/m_extension_server.git
  local_auth: ^3.0.1
  flutter_web_auth_2: ^4.1.0

dependency_overrides:
  ffi: ^2.1.3
  html: ^0.15.4
  flutter_web_auth_2:
    git:
      url: https://github.com/ThexXTURBOXx/flutter_web_auth_2.git
      ref: 3.x-without-v1
      path: flutter_web_auth_2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  isar_community_generator:
    git:
      url: https://github.com/kodjodevf/isar-community-generator.git
      ref: v3
  flutter_lints: ^6.0.0
  freezed: ^3.0.0
  protoc_plugin: ^23.0.0

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - path: assets/fonts/
      platforms: [android]
    - assets/app_icons/
    - assets/trackers_icons/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/app_icons/icon-red.png"
  min_sdk_android: 21
